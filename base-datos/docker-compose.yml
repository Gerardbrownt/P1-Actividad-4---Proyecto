version: "3.9"

services:
  db:
    image: postgres:16
    container_name: inventario_db
    restart: always
    env_file: .env
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
      - ./init:/docker-entrypoint-initdb.d
    networks:
      - inventario_net

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: inventario_pgadmin
    restart: always
    env_file: .env
    ports:
      - "5050:80"
    depends_on:
      - db
    networks:
      - inventario_net

volumes:
  db_data:

networks:
  inventario_net:
    driver: bridge